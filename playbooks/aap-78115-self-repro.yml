---
# AAP-78115 reproduction — runs ON an AAP instance against itself.
# Reference: https://redhat.atlassian.net/browse/AAP-78115
#
# Job Template requirements:
#   - Inventory: localhost
#   - Credential: Red Hat Ansible Automation Platform (gateway URL + admin) — used ONLY to mint the test token
#   - EE: default controller EE (ansible.controller 4.8.0 on vulnerable builds)
#
# Important: The AnsibleJob runner does NOT have admin username/password in its environment.
# It only receives CONTROLLER_OAUTH_TOKEN from the connection secret. If those basic-auth
# env vars leak into the repro task (from the attached credential), job_list will succeed
# even on a vulnerable build and you get a false negative.

- name: AAP-78115 — self-referential OAuth token auth repro
  hosts: localhost
  gather_facts: false
  connection: local

  vars:
    validate_certs: "{{ lookup('env', 'CONTROLLER_VERIFY_SSL') | default('true', true) | bool }}"
    token_description: "AAP-78115 self-repro {{ now(utc=true, fmt='%Y%m%dT%H%M%SZ') }}"

  environment:
    CONTROLLER_OPTIONAL_API_URLPATTERN_PREFIX: "/api/controller/"

  pre_tasks:
    - name: Resolve gateway URL from attached AAP credential
      ansible.builtin.set_fact:
        aap_host: "{{ lookup('env', 'CONTROLLER_HOST') | default(lookup('env', 'TOWER_HOST'), true) | regex_replace('/$', '') }}"

    - name: Fall back to TOWER_URL_BASE from controller settings
      when: aap_host | length == 0
      ansible.builtin.set_fact:
        aap_host: "{{ lookup('ansible.controller.controller_api', 'settings/all')['TOWER_URL_BASE'] | regex_replace('/$', '') }}"

    - name: Resolve admin credentials from attached AAP credential
      ansible.builtin.set_fact:
        aap_username: "{{ lookup('env', 'CONTROLLER_USERNAME') | default(lookup('env', 'TOWER_USERNAME'), true) }}"
        aap_password: "{{ lookup('env', 'CONTROLLER_PASSWORD') | default(lookup('env', 'TOWER_PASSWORD'), true) }}"

    - name: Validate self-referential auth is available
      ansible.builtin.assert:
        that:
          - aap_host | length > 0
          - aap_username | length > 0
          - aap_password | length > 0
        fail_msg: >
          Attach a Red Hat Ansible Automation Platform credential for this instance
          (gateway URL + admin user/password). Needed to create the gateway test token.

    - name: Show target and auth context
      ansible.builtin.debug:
        msg:
          - "Target (self): {{ aap_host }}"
          - "Auth user (token creation only): {{ aap_username }}"
          - "Credential injects basic auth into job env: {{ (lookup('env', 'CONTROLLER_USERNAME') | default('', true) | length > 0) | ternary('yes — repro task will strip it', 'no') }}"

    - name: Show ansible.controller collection version
      ansible.builtin.command: ansible-galaxy collection list ansible.controller
      register: controller_collection_version
      changed_when: false

    - name: Display ansible.controller collection version
      ansible.builtin.debug:
        var: controller_collection_version.stdout_lines

  tasks:
    - name: Run AAP-78115 reproduction
      block:
        - name: Create a gateway Bearer token on this instance
          ansible.builtin.uri:
            url: "{{ aap_host }}/api/gateway/v1/tokens/"
            method: POST
            user: "{{ aap_username }}"
            password: "{{ aap_password }}"
            force_basic_auth: true
            body_format: json
            body:
              description: "{{ token_description }}"
              scope: write
            validate_certs: "{{ validate_certs }}"
            status_code: 201
          register: token_create

        - name: Capture token for repro steps
          ansible.builtin.set_fact:
            repro_token: "{{ token_create.json.token }}"
            repro_token_id: "{{ token_create.json.id }}"

        - name: "Control test — direct API call with Bearer token (should succeed)"
          ansible.builtin.uri:
            url: "{{ aap_host }}/api/controller/v2/job_templates/"
            method: GET
            headers:
              Authorization: "Bearer {{ repro_token }}"
              Content-Type: application/json
            validate_certs: "{{ validate_certs }}"
            status_code: 200

        - name: "Control test — empty basic auth fails (proves token-only path matters)"
          ansible.builtin.uri:
            url: "{{ aap_host }}/api/controller/v2/job_templates/"
            method: GET
            force_basic_auth: true
            url_username: ""
            url_password: ""
            validate_certs: "{{ validate_certs }}"
          register: empty_basic_auth_result
          ignore_errors: true

        - name: Show empty basic auth control result
          ansible.builtin.debug:
            msg: >-
              Empty basic auth returned HTTP {{ empty_basic_auth_result.status | default('error') }}.
              {{ 'Expected 401 — gateway rejects empty basic auth.' if (empty_basic_auth_result.status | default(0)) == 401 else 'Unexpected; check gateway auth behaviour.' }}

        - name: "Bug repro — job_list with token only (matches AnsibleJob runner env)"
          ansible.controller.job_list:
            controller_host: "{{ aap_host }}"
            aap_token: "{{ repro_token }}"
            controller_username: ""
            controller_password: ""
            validate_certs: "{{ validate_certs }}"
            request_timeout: 10
          environment:
            CONTROLLER_OAUTH_TOKEN: "{{ repro_token }}"
            TOWER_OAUTH_TOKEN: "{{ repro_token }}"
            AAP_TOKEN: "{{ repro_token }}"
            CONTROLLER_USERNAME: ""
            CONTROLLER_PASSWORD: ""
            TOWER_USERNAME: ""
            TOWER_PASSWORD: ""
          register: job_list_result
          ignore_errors: true

        - name: Report result
          ansible.builtin.debug:
            msg: >-
              {{
                'BUG REPRODUCED (AAP-78115): ansible.controller returned HTTP 401 with token-only auth.
                Bearer token works via uri; collection ignores aap_token/CONTROLLER_OAUTH_TOKEN and uses empty Basic auth.'
                if (job_list_result is failed and '401' in (job_list_result.msg | default('')))
                else 'NOT REPRODUCED: job_list succeeded with token-only auth — collection is sending Bearer token correctly.'
              }}

        - name: Fail when bug is reproduced (expected on vulnerable 4.8.0)
          ansible.builtin.fail:
            msg: |
              AAP-78115 confirmed on {{ aap_host }}.
              Error: {{ job_list_result.msg }}
              Root cause: ansible.controller 4.8.0 accepts aap_token but sends empty Basic auth instead.
          when:
            - job_list_result is failed
            - "'401' in (job_list_result.msg | default(''))"

      always:
        - name: Revoke reproduction token
          ansible.builtin.uri:
            url: "{{ aap_host }}/api/gateway/v1/tokens/{{ repro_token_id }}/"
            method: DELETE
            user: "{{ aap_username }}"
            password: "{{ aap_password }}"
            force_basic_auth: true
            validate_certs: "{{ validate_certs }}"
            status_code: [204, 404]
          when: repro_token_id is defined
